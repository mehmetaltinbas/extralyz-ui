<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <link rel="icon" type="image" href="/public/mortarboard-fill.svg" />
        <title>Praxtive</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <style type="text/tailwindcss">
            :root {
                --color-surface: #FFFFFF;
                --color-surface-alt: #F5F5F5;
                --color-surface-hover: #E5E5E5;
                --color-surface-muted: #F0F0F0;
                --color-border: #D1D5DB;
                --color-border-strong: #000000;
                --color-text-primary: #000000;
                --color-text-secondary: #4B5563;
                --color-text-muted: #9CA3AF;
                --color-text-inverted: #FFFFFF;
                --color-accent: #9B1B30;
                --color-accent-hover: #FFFFFF;
                --color-btn-primary-bg: #000000;
                --color-btn-primary-text: #FFFFFF;
                --color-btn-primary-hover-bg: #FFFFFF;
                --color-btn-primary-hover-text: #000000;
                --color-scrollbar-track: #F5F5F5;
                --color-scrollbar-thumb: #CCCCCC;
                --color-text-correct: #14532D;
                --color-scrollbar-thumb-hover: #999999;
            }

            .dark {
                --color-surface: #111111;
                --color-surface-alt: #1A1A1A;
                --color-surface-hover: #2A2A2A;
                --color-surface-muted: #222222;
                --color-border: #333333;
                --color-border-strong: #FFFFFF;
                --color-text-primary: #F5F5F5;
                --color-text-secondary: #A0A0A0;
                --color-text-muted: #666666;
                --color-text-inverted: #000000;
                --color-accent: #9B1B30;
                --color-accent-hover: #1A1A1A;
                --color-btn-primary-bg: #FFFFFF;
                --color-btn-primary-text: #000000;
                --color-btn-primary-hover-bg: #111111;
                --color-btn-primary-hover-text: #FFFFFF;
                --color-scrollbar-track: #1A1A1A;
                --color-scrollbar-thumb: #444444;
                --color-text-correct: #6EE7B7;
                --color-scrollbar-thumb-hover: #666666;
            }

            @theme {
                --color-surface: var(--color-surface);
                --color-surface-alt: var(--color-surface-alt);
                --color-surface-hover: var(--color-surface-hover);
                --color-surface-muted: var(--color-surface-muted);
                --color-border: var(--color-border);
                --color-border-strong: var(--color-border-strong);
                --color-text-primary: var(--color-text-primary);
                --color-text-secondary: var(--color-text-secondary);
                --color-text-muted: var(--color-text-muted);
                --color-text-inverted: var(--color-text-inverted);
                --color-accent: var(--color-accent);
                --color-accent-hover: var(--color-accent-hover);
                --color-btn-primary-bg: var(--color-btn-primary-bg);
                --color-btn-primary-text: var(--color-btn-primary-text);
                --color-btn-primary-hover-bg: var(--color-btn-primary-hover-bg);
                --color-btn-primary-hover-text: var(--color-btn-primary-hover-text);
                --color-scrollbar-track: var(--color-scrollbar-track);
                --color-scrollbar-thumb: var(--color-scrollbar-thumb);
                --color-text-correct: var(--color-text-correct);
                --color-scrollbar-thumb-hover: var(--color-scrollbar-thumb-hover);
            }
        </style>
    </head>
    <body>
        <script>
            (function() {
                var theme = localStorage.getItem('theme');
                if (theme === 'dark') document.documentElement.classList.add('dark');
            })();
        </script>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
